name: Monorepo CI/CD

on:
  push:
    paths:
      - 'level-3-orange-belt/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'level-3-orange-belt/**'

jobs:
  test-backend:
    name: Test Smart Contracts (L3)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./level-3-orange-belt/contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: level-3-orange-belt/contracts -> target

      - name: Build Contracts
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Run Tests
        run: cargo test

  test-frontend:
    name: Build and Test Frontend (L3)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./level-3-orange-belt/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: level-3-orange-belt/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Tests
        run: npm test --if-present

      - name: Build Project
        run: npm run build
